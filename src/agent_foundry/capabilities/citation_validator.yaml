name: citation_validator
description: Validates that all cited evidence IDs exist in retrieved evidence
version: "1.0.0"
implementation:
  module: agent_foundry.capabilities.citation_validator
  class_name: CitationValidatorCapability
inputs_schema:
  type: object
  properties:
    evidence_ids:
      type: array
      items:
        type: string
    retrieved_evidence:
      type: array
      items:
        type: object
  required:
    - evidence_ids
    - retrieved_evidence
outputs_schema:
  type: object
  properties:
    valid:
      type: boolean
    missing_ids:
      type: array
  required:
    - valid
tags:
  - validation
  - eval_gate
  - citation
quality_controls:
  timeout_seconds: 10
  max_retries: 0
