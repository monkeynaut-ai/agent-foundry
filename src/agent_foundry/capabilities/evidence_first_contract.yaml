name: evidence_first_contract
description: Enforces evidence-first policy — no recommendation without evidence
version: "1.0.0"
implementation:
  module: agent_foundry.capabilities.evidence_first
  class_name: EvidenceFirstContractCapability
inputs_schema:
  type: object
  properties:
    retrieved_evidence:
      type: array
    recommendation:
      type: object
  required:
    - retrieved_evidence
outputs_schema:
  type: object
  properties:
    valid:
      type: boolean
    outcome:
      type: string
  required:
    - valid
    - outcome
tags:
  - validation
  - eval_gate
  - evidence
  - contract
quality_controls:
  timeout_seconds: 10
  max_retries: 0
