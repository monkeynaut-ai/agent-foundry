[project]
name = "agent-foundry"
version = "0.1.0"
description = "Default template for PDM package"
authors = [
    {name = "mark norman", email = "mark@marknorman.com"},
]
dependencies = [
    "pydantic>=2.12.5",
    "pytest>=9.0.2",
    "pyyaml>=6.0.3",
    "python-dotenv>=1.2.1",
    "langchain-anthropic>=1.3.4",
    "jsonschema>=4.26.0",
    "langchain-community>=0.4.1",
    "faiss-cpu>=1.13.2",
    "langchain-huggingface>=1.2.0",
    "langgraph>=1.0.9",
]
requires-python = "==3.13.*"
readme = "README.md"
license = {text = "MIT"}


[tool.pdm]
distribution = false

[tool.pdm.scripts]
demo.cmd = "python -m agent_foundry.demo.cli"
demo.env = {PYTHONPATH = "src"}

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-m 'not benchmark'"
markers = [
    "benchmark: performance benchmark tests (excluded from normal runs)",
]
