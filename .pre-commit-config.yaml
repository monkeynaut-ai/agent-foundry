repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.14
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: py-compile
        name: py_compile
        entry: python -m py_compile
        language: system
        types: [python]
      - id: lint-imports
        name: lint-imports (architectural contracts)
        entry: bash -c 'pdm run lint-imports'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit, pre-push]
      - id: pytest-unit
        name: pytest (unit)
        # Tolerate exit code 5 (no tests collected) — happens when a
        # commit touches no Python files relevant to the test selection.
        entry: bash -c 'pdm run test-unit || [ $? -eq 5 ]'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      - id: pytest-all
        name: pytest (unit + integration)
        entry: "bash -c 'if docker info > /dev/null 2>&1; then pdm run test-all; else echo \"WARNING: Docker not available — skipping integration tests. Run the full suite before merging.\" >&2; pdm run test-unit; fi'"
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
