repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.14
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: py-compile
        name: py_compile
        entry: python -m py_compile
        language: system
        types: [python]
      - id: pytest
        name: pytest
        entry: pdm run pytest tests/ -x -q -m "not benchmark and not integration"
        language: system
        pass_filenames: false
        always_run: true
