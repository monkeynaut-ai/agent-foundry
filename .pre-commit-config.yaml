repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: pdm run format
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-lint
        name: ruff lint
        entry: pdm run lint
        language: system
        types: [python]
        pass_filenames: false
