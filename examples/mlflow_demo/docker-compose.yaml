services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.7.0
    ports:
      - "5000:5000"
    command:
      - mlflow
      - server
      - --host=0.0.0.0
      - --port=5000
      - --backend-store-uri=sqlite:////mlflow/mlflow.db
      - --default-artifact-root=/mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow

volumes:
  mlflow_data:
